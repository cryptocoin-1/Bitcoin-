<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
    background:#f5f5f7;
    color:#111;
    padding-bottom:90px;
}

.container{
    padding:20px;
}

.topbar{
    display:flex;
    align-items:center;
    gap:12px;
}

.avatar{
    width:42px;
    height:42px;
    border-radius:50%;
    background:#d9d9d9;
}

.search{
    flex:1;
    background:white;
    border:1px solid #ddd;
    border-radius:30px;
    padding:12px 16px;
    font-size:15px;
    outline:none;
}

.asset-card{
    margin-top:25px;
}

.balance{
    font-size:34px;
    font-weight:700;
    margin-top:8px;
}

.withdraw{
    margin-top:15px;
    background:#111;
    color:white;
    border:none;
    padding:12px 28px;
    border-radius:25px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
}

.cards{
    margin-top:20px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.card{
    background:white;
    border-radius:18px;
    padding:18px;
    box-shadow:0 3px 12px rgba(0,0,0,.08);
}

.card h3{
    color:#666;
    font-size:15px;
}

.card p{
    margin-top:12px;
    font-size:20px;
    font-weight:700;
}

.market{
    margin-top:20px;
    background:white;
    border-radius:18px;
    padding:18px;
    box-shadow:0 3px 12px rgba(0,0,0,.08);
}

.market-title{
    font-size:18px;
    font-weight:700;
    margin-bottom:12px;
}

.coin{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 0;
    border-bottom:1px solid #eee;
}

.coin:last-child{
    border-bottom:none;
}

.coin-name{
    font-size:17px;
    font-weight:700;
}

.coin-price{
    font-size:17px;
    font-weight:700;
}

.green{
    color:#00c853;
    font-weight:700;
}

.red{
    color:#ff3d57;
    font-weight:700;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:70px;
    background:white;
    border-top:1px solid #ddd;
    display:flex;
    justify-content:space-around;
    align-items:center;
}

.nav-item{
    color:#777;
    font-size:13px;
}

.active{
    color:#111;
    font-weight:700;
}
</style>
</head>

<body>

<div class="container">

    <div class="topbar">
        <div class="avatar"></div>
        <input class="search" placeholder="Search Market">
    </div>

    <div class="asset-card">

        <div style="color:#666;font-size:15px;">
            Total Assets
        </div>

        <div class="balance" id="balance">
            $765,436.87
        </div>

        <div style="color:#666;margin-top:5px;">
            USD
        </div>

        <button class="withdraw">
            Withdraw
        </button>

    </div>

    <div class="cards">

        <div class="card">
            <h3>Token Splash</h3>
            <p>200,000 USDT</p>
        </div>

        <div class="card">
            <h3>Easy Earn</h3>
            <p>6.34%</p>
        </div>

    </div>

    <div class="market">

        <div class="market-title">
            Hot Markets
        </div>

        <div class="coin">
            <div class="coin-name">BTC/USDT</div>
            <div style="text-align:right;">
                <div class="coin-price">63,739.70</div>
                <div class="green">+0.18%</div>
            </div>
        </div>

        <div class="coin">
            <div class="coin-name">ETH/USDT</div>
            <div style="text-align:right;">
                <div class="coin-price">1,670.02</div>
                <div class="red">-0.58%</div>
            </div>
        </div>

        <div class="coin">
            <div class="coin-name">SOL/USDT</div>
            <div style="text-align:right;">
                <div class="coin-price">67.25</div>
                <div class="green">+0.37%</div>
            </div>
        </div>

    </div>

</div>

<div class="bottom-nav">
    <div class="nav-item active">Home</div>
    <div class="nav-item">Markets</div>
    <div class="nav-item">Trade</div>
    <div class="nav-item">Earn</div>
    <div class="nav-item">Assets</div>
</div>

<script>

const balanceElement = document.getElementById("balance");

let balance = 765436.87;

function updateBalance() {

    const change = (Math.random() * 10000) - 5000;

    balance += change;

    balanceElement.textContent =
        "$" + balance.toLocaleString("en-US", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
}

setInterval(updateBalance, 5000);

</script>

</body>
</html>
