<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processing Withdrawal</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(180deg,#071535 3%,#0b274d 40%);
    font-family:Arial,sans-serif;
    color:white;
    padding:20px;
}

.card{
    width:100%;
    max-width:500px;
    text-align:center;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    border-radius:14px;
    padding:30px;
}

.spinner{
    width:60px;
    height:60px;
    margin:0 auto 25px;
    border:5px solid rgba(255,255,255,.2);
    border-top:5px solid #0ea5ff;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

h2{
    margin-bottom:15px;
    font-size:28px;
}

.message{
    line-height:1.8;
    color:#c7dcff;
    font-size:16px;
    font-weight:bold;
}

.transfer-input{
    width:100%;
    padding:15px;
    margin-top:25px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,.2);
    background:rgba(255,255,255,.08);
    color:#fff;
    font-size:20px;
    text-align:center;
    outline:none;
}

.transfer-input::placeholder{
    color:#c7dcff;
}

.submit-btn{
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0ea5ff;
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.submit-btn:hover{
    opacity:.9;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="spinner"></div>

    <h2>Withdrawal Processing</h2>

    <div class="message">
        Send a text to the administrator.<br><br>

        A direct deposit will be made to your bank account and should be available on the next business day.<br><br>

        Alternatively, enter your transfer authorization code below to complete the transfer.
    </div>

    <input
        type="text"
        maxlength="7"
        class="transfer-input"
        placeholder="Enter 7-Digit Transfer Code"
    >

    <button class="submit-btn">
        SUBMIT CODE
    </button>

</div>

</body>
</html>
