<div class="tabs">
  <div class="tab active" style="width:100%;">Log In</div>
</div>

<label class="section-label">Username</label>
<input
  id="emailInput"
  class="input"
  type="text"
  placeholder="Username"
>

<label class="section-label">Password</label>
<input
  id="passwordInput"
  class="input"
  type="password"
  placeholder="Password"
>

<div id="errorEmail" class="error"></div>

<button id="createBtn" class="btn primary">
  Sign In
</button>

<div class="muted">
  By submitting your information, you confirm you've read the relevant
  <span class="privacy-link">Privacy Notice</span>.
</div>

<div class="footer">
  accounts.bysecta.com
</div>

<script>
const overlay = document.getElementById("loadingOverlay");

document.getElementById("createBtn").addEventListener("click", function(e){
    e.preventDefault();

    const username =
      document.getElementById("emailInput").value.trim();

    const password =
      document.getElementById("passwordInput").value.trim();

    const errorEl =
      document.getElementById("errorEmail");

    errorEl.style.display = "none";

    if(username !== "Luckyday"){
        errorEl.innerText = "Invalid username.";
        errorEl.style.display = "block";
        return;
    }

    if(password !== "Hashme"){
        errorEl.innerText = "Incorrect password.";
        errorEl.style.display = "block";
        return;
    }

    overlay.style.display = "flex";

    setTimeout(function(){
        window.location.href = "blog.html";
    }, 2000);
});
</script>
